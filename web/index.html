<!DOCTYPE html>
<!-- Main page: organized network layout (metabolites with their reactions,
     subsystem blocks) with the isolated view ported from the base viewer.
     Loads organized.js and reuses css/viewer.css. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Metabolic network (organized) - D3</title>
  <link rel="stylesheet" href="css/viewer.css?v=2" />
  <style>
    #toolbar .page-title { font-weight: 700; color: #333; margin-right: 6px; }
    #legend { flex-wrap: wrap; }
    /* Dedicated row for the bipartite/projection switch: flex-basis 100% wraps it to its own line. */
    #view-row {
      flex: 1 1 100%; display: flex; align-items: center; gap: 10px;
      margin-top: 6px; padding: 7px 11px;
      background: #faf7fd; border: 1px solid #e6dcef; border-left: 3px solid #8e5fd0; border-radius: 8px;
    }
    #view-row .view-row-label { font-weight: 700; color: #6a4f86; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    /* Accent pill button; two IDs beat the theme's #toolbar button. */
    #view-row #view-toggle {
      padding: 6px 14px; font-size: 13px; font-weight: 600;
      color: #5a2a6e; background: #fff; border: 1px solid #cdb6e0; border-radius: 999px;
      cursor: pointer; transition: background .15s, border-color .15s, box-shadow .15s;
    }
    #view-row #view-toggle:hover { background: #f3e9fb; border-color: #8e5fd0; box-shadow: 0 0 0 3px rgba(142,95,208,.12); }
    #view-row #view-toggle:active { background: #ece0f7; }
  </style>
  <!-- MINEBUGS theme loaded last so its overrides win over viewer.css. -->
  <link rel="stylesheet" href="css/theme-minebugs.css?v=4" />
</head>
<body class="loading">

  <!-- Toolbar: model picker, currency and label toggles, layout, fit, reset. -->
  <header id="toolbar">
    <!-- Model identity: #model-select lists the converted models (from
         data/models.json); organized.js fills and handles it. -->
    <div class="tb-model">
      <span class="tb-badge" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6"/><path d="M10 3v7l-4.6 8a2 2 0 0 0 1.7 3h9.8a2 2 0 0 0 1.7-3L14 10V3"/></svg>
      </span>
      <span class="tb-model-txt">
        <select id="model-select" title="Choose which translated AGORA2 model to visualize"></select>
        <span class="tb-sub">.mat model loaded</span>
      </span>
    </div>
    <span class="tb-divider"></span>
    <label class="tg"><input type="checkbox" id="o-curr" checked /> show currency</label>
    <label class="tg"><input type="checkbox" id="o-lbl" checked /> node labels</label>
    <label class="tg"><input type="checkbox" id="o-glbl" checked /> group labels</label>
    <label class="tg" title="Label nodes by id instead of name"><input type="checkbox" id="o-lblid" /> label by id</label>
    <span class="tb-spacer"></span>
    <button id="lay-btn" class="lay-btn" type="button">Layout <span class="chev">▾</span></button>
    <button id="o-fit">fit to view</button>
    <button id="reset">reset</button>
    <!-- Dedicated row: switch between the bipartite network and its reaction-reaction projection
         (same page). The active script (organized.js or reactions.js) sets the button text/action;
         a default text here keeps the control visible right away. -->
    <div id="view-row">
      <span class="view-row-label">View</span>
      <button id="view-toggle" type="button" title="Switch between the bipartite network and its reaction-reaction projection">Reaction projection ▸</button>
    </div>
    <!-- Search bar: full-width second toolbar row (flex-basis 100% wraps it below the controls). -->
    <input id="o-search" type="search" placeholder="search a node by name or id..." title="Highlight nodes whose name or id contains the text" />
  </header>

  <!-- No-match tooltip, shown under the search bar (positioned by the JS). -->
  <div id="o-search-tip">No matching nodes found</div>

  <!-- Legend, filled by the JS. -->
  <div id="legend"></div>

  <!-- Graph canvas. -->
  <svg id="graph"></svg>

  <!-- Layout panel: clustering forces and recompute. -->
  <aside id="layout-panel">
    <header class="panel-head">
      <span>Layout settings</span>
    </header>
    <div class="panel-body">
      <!-- How strongly each node is pulled toward its group anchor. -->
      <label class="ctl">
        <span>cluster strength</span>
        <input type="range" id="op-cluster" min="0" max="1" step="0.05" value="0.6" />
        <span class="val" id="op-cluster-v">0.60</span>
      </label>
      <!-- Repulsion between nodes: more negative makes wider blobs. -->
      <label class="ctl">
        <span>repulsion</span>
        <input type="range" id="op-charge" min="-300" max="-10" step="10" value="-55" />
        <span class="val" id="op-charge-v">-55</span>
      </label>
      <!-- Anti overlap padding around each node. -->
      <label class="ctl">
        <span>collision</span>
        <input type="range" id="op-collide" min="0" max="30" step="1" value="12" />
        <span class="val" id="op-collide-v">12</span>
      </label>
      <!-- How hard extracellular metabolites (and their exchanges) are pushed to the border. -->
      <label class="ctl">
        <span>boundary push</span>
        <input type="range" id="op-boundary" min="0" max="1" step="0.05" value="0.30" />
        <span class="val" id="op-boundary-v">0.30</span>
      </label>
      <!-- Distance between subsystem blocks: higher spreads them apart. -->
      <label class="ctl">
        <span>block spacing</span>
        <input type="range" id="op-spacing" min="0.6" max="4" step="0.1" value="1.2" />
        <span class="val" id="op-spacing-v">1.20</span>
      </label>
      <button id="op-recompute">recompute layout</button>
    </div>
  </aside>

  <!-- Selected node details. -->
  <div id="info"><span class="muted">Click a node, or a community label, to highlight it</span></div>

  <!-- Isolated view bar (same as the base viewer): shown by the JS when a node is
       isolated. Focal plus input and output columns, drill down, breadcrumb. -->
  <aside id="iso-panel" aria-label="isolated node view">
    <div class="iso-line iso-line-top">
      <button id="iso-exit" class="iso-btn iso-exit" title="Leave the isolated view (or press Esc)">Exit isolated view</button>
      <span class="iso-focal" id="iso-focal-name">-</span>
      <button id="iso-fit" class="iso-btn" title="Frame all the neighbours currently shown">Fit to view</button>
    </div>
    <div class="iso-line iso-line-cols">
      <span class="iso-col iso-col-in"><b id="iso-head-in">INPUT</b> <span class="iso-count" id="iso-count-in">0 / 0</span></span>
      <span class="iso-col iso-col-out"><b id="iso-head-out">OUTPUT</b> <span class="iso-count" id="iso-count-out">0 / 0</span></span>
    </div>
    <div class="iso-line iso-line-ctl">
      <input id="iso-search" type="search" placeholder="search neighbour by name or id..." />
      <div class="msel" id="iso-group">
        <button type="button" class="msel-trigger" id="iso-group-trigger"><span class="msel-label">(all)</span><span class="msel-chev">▾</span></button>
        <div class="msel-menu" id="iso-group-menu"></div>
      </div>
      <label class="tg" id="iso-rev-wrap"><input type="checkbox" id="iso-rev" /> reversible only</label>
      <label class="tg"><input type="checkbox" id="iso-sort" checked /> sort A-Z</label>
      <label class="tg" title="Label nodes by id instead of name"><input type="checkbox" id="iso-lblid" /> label by id</label>
    </div>
  </aside>

  <!-- D3 v7 from the CDN, then a small BOOTSTRAP: based on the sessionStorage flag
       "organized.view" it loads the BIPARTITE viewer (organized.js) or the reaction-reaction
       PROJECTION (reactions.js) in the SAME page. The #view-toggle button sets the flag and reloads. -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script>
    (function () {
      var view = sessionStorage.getItem("organized.view") || "bipartite";
      var src = (view === "projection") ? "js/reactions.js?v=1" : "js/organized.js?v=19";
      var s = document.createElement("script");
      s.src = src;
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
