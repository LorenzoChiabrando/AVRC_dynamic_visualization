<!DOCTYPE html>
<!-- REACTION-REACTION projection (directed producer to consumer). Same style and behaviour as the
     organized bipartite page: reuses css/viewer.css + theme, subsystem blocks, search, labels,
     isolated view. Loads js/reactions.js (an adapted clone of organized.js for a reaction-only
     graph). Data: data/reactions.json (or the selected model's projection). -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Reaction projection - D3</title>
  <link rel="stylesheet" href="css/viewer.css?v=2" />
  <style>
    /* Toolbar title for this page (in place of the model block). */
    #toolbar .page-title { font-weight: 700; color: #333; margin-right: 6px; }
    #legend { flex-wrap: wrap; }
  </style>
  <!-- MINEBUGS theme loaded last so its overrides win over viewer.css. -->
  <link rel="stylesheet" href="css/theme-minebugs.css?v=5" />
</head>
<body class="loading">

  <!-- Toolbar: title, node/group/id label toggles, fit, reset, search bar. No "currency" toggle
       (no metabolites here) and no model picker. -->
  <header id="toolbar">
    <span class="page-title">Reaction projection</span>
    <span class="tb-divider"></span>
    <label class="tg"><input type="checkbox" id="o-lbl" checked /> node labels</label>
    <label class="tg"><input type="checkbox" id="o-glbl" checked /> group labels</label>
    <label class="tg" title="Label nodes by id instead of name"><input type="checkbox" id="o-lblid" /> label by id</label>
    <span class="tb-spacer"></span>
    <button id="lay-btn" class="lay-btn" type="button">Layout <span class="chev">▾</span></button>
    <button id="o-fit">fit to view</button>
    <button id="reset">reset</button>
    <!-- Full-width second row (flex-basis 100% wraps it): search by name or id. -->
    <input id="o-search" type="search" placeholder="search a reaction by name or id..." title="Highlight reactions whose name or id contains the text" />
  </header>

  <!-- No-match tooltip (positioned by the JS). -->
  <div id="o-search-tip">No matching nodes found</div>

  <!-- Legend, filled by the JS. -->
  <div id="legend"></div>

  <!-- Graph canvas. -->
  <svg id="graph"></svg>

  <!-- Layout panel: block-layout forces and recompute. -->
  <aside id="layout-panel">
    <header class="panel-head">
      <span>Layout settings</span>
    </header>
    <div class="panel-body">
      <label class="ctl">
        <span>cluster strength</span>
        <input type="range" id="op-cluster" min="0" max="1" step="0.05" value="0.6" />
        <span class="val" id="op-cluster-v">0.60</span>
      </label>
      <label class="ctl">
        <span>repulsion</span>
        <input type="range" id="op-charge" min="-300" max="-10" step="10" value="-110" />
        <span class="val" id="op-charge-v">-110</span>
      </label>
      <label class="ctl">
        <span>collision</span>
        <input type="range" id="op-collide" min="0" max="30" step="1" value="14" />
        <span class="val" id="op-collide-v">14</span>
      </label>
      <label class="ctl">
        <span>boundary push</span>
        <input type="range" id="op-boundary" min="0" max="1" step="0.05" value="0.30" />
        <span class="val" id="op-boundary-v">0.30</span>
      </label>
      <label class="ctl">
        <span>block spacing</span>
        <input type="range" id="op-spacing" min="0.6" max="4" step="0.1" value="1.8" />
        <span class="val" id="op-spacing-v">1.80</span>
      </label>
      <button id="op-recompute">recompute layout</button>
    </div>
  </aside>

  <!-- Selected node details. -->
  <div id="info"><span class="muted">Click a node, or a community label, to highlight it</span></div>

  <!-- Isolated view bar: focal plus two columns (UPSTREAM = reactions feeding it, DOWNSTREAM =
       reactions it feeds), drill down, breadcrumb. Headers are set by the JS. -->
  <aside id="iso-panel" aria-label="isolated node view">
    <div class="iso-line iso-line-top">
      <button id="iso-exit" class="iso-btn iso-exit" title="Leave the isolated view (or press Esc)">Exit isolated view</button>
      <button id="iso-fit" class="iso-btn" title="Frame all the neighbours currently shown">Fit to view</button>
    </div>
    <!-- Path (breadcrumb) on its OWN full-width row, horizontally scrollable. -->
    <div class="iso-line iso-line-path">
      <span class="iso-focal" id="iso-focal-name">-</span>
    </div>
    <div class="iso-line iso-line-cols">
      <span class="iso-col iso-col-in"><b id="iso-head-in">UPSTREAM</b> <span class="iso-count" id="iso-count-in">0 / 0</span></span>
      <span class="iso-col iso-col-out"><b id="iso-head-out">DOWNSTREAM</b> <span class="iso-count" id="iso-count-out">0 / 0</span></span>
    </div>
    <div class="iso-line iso-line-ctl">
      <input id="iso-search" type="search" placeholder="search neighbour by name or id..." />
      <div class="msel" id="iso-group">
        <button type="button" class="msel-trigger" id="iso-group-trigger"><span class="msel-label">(all)</span><span class="msel-chev">▾</span></button>
        <div class="msel-menu" id="iso-group-menu"></div>
      </div>
      <label class="tg" id="iso-rev-wrap"><input type="checkbox" id="iso-rev" /> reversible only</label>
      <label class="tg"><input type="checkbox" id="iso-sort" checked /> sort A-Z</label>
      <label class="tg" title="Label nodes by id instead of name"><input type="checkbox" id="iso-lblid" /> label by id</label>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="js/reactions.js?v=2"></script>
</body>
</html>
