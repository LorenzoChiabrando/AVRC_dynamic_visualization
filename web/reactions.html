<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Reaction projection - D3</title>
  <link rel="stylesheet" href="css/reactions.css" />
</head>
<body>
  <!-- Graph canvas: D3 fills this with the nodes and edges. -->
  <svg id="graph"></svg>

  <!-- Details of the selected node. -->
  <div id="info"><span class="muted">Click a node to see its details</span></div>

  <!-- Filters: only a subsystem highlight here (no metabolites in this projection). -->
  <div id="controls">
    <label><span class="lab">Subsystem (highlight reactions)</span>
      <select id="filter-subsystem"><option value="">(none)</option></select>
    </label>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="js/reactions.js"></script>
</body>
</html>
